name: Bookswagon E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install selenium pytest pytest-html webdriver-manager setuptools

      - name: Install package
        run: pip install -e .

      - name: Run tests
        env:
          TEST_EMAIL: ${{ aarconn23@gmail.com }}
          TEST_PASSWORD: ${{ Password@12 }}
          HEADLESS: "true"
        run: python -m pytest tests/ --html=report.html --junitxml=report.xml -v

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: |
            report.html
            report.xml
          retention-days: 30
